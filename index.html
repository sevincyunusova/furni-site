<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furni</title>

<body class="m-0 p-0 overflow-x-hidden">
    <script src="https://cdn.tailwindcss.com"></script>


    <div class="navbar border-b-[8px] border-[#A0D9C1] bg-[#3b5d50] md:px-10 md:py-5 flex justify-between w-full items-center">
        <div class="nav-logo px-8 py-2 flex gap-2 items-center">

            <p class="font-bold text-[30px] text-[#899E96] cursor-pointer ">.</p>
        </div>
        <div class="nav-icon block md:hidden px-8 py-2 flex">
            <span id="navIcon"
                class="material-symbols-outlined text-[#899E96] text-[35px] items-center cursor-pointer hover:scale-110 transition-transform">

                <li class="text-[#A0D9C1] hover:text-[#FEF9F3] transition font-bold cursor-pointer">Blog</li>
                <li class="text-[#A0D9C1] hover:text-[#FEF9F3] transition font-bold cursor-pointer">Contact Us</li>
            </ul>

            <div class="icons flex gap-3 text-[12px] text-white">
                <span class="material-symbols-outlined cursor-pointer">
                    person
                </span>
                <span class="material-symbols-outlined cursor-pointer">
                    shopping_cart
                </span>
            </div>
        </div>

        
    </div>

    <div class="page-1 bg-[#3b5d50]"> 
    </div>
